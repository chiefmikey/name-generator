name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - run: npx eslint .
      - run: npm test
      - run: npm run build:prod
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: public
